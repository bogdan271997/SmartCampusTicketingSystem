{% extends 'base.html' %}

{% block title %}Register — Smart Campus{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card sd-card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <p class="sd-kicker text-center mb-2">Join</p>
                <h2 class="mb-4 text-center sd-page-title">Create an account</h2>

                <form method="POST" id="sd-register-form" novalidate>
                    <div id="sd-register-feedback" class="alert alert-warning d-none py-2 mb-3" role="alert"></div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Full name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Email</label>
                        <input type="email" name="email" class="form-control" required autocomplete="email">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Password</label>
                        <input type="password" name="password" class="form-control" minlength="6" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary sd-btn-primary w-100">Create account</button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    Already registered?
                    <a href="{{ url_for('auth.login') }}">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
